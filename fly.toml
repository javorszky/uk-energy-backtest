# Fly.io configuration — Phase 1 embedded deployment: one machine running the
# single Go binary with the SPA embedded. The app is fully stateless (nothing
# is persisted server-side), so machines can stop when idle and scale to zero.
#
#   fly launch --no-deploy   # first time, to create the app
#   fly deploy

app = "uk-energy-backtest"
primary_region = "lhr"

[build]
  dockerfile = "build/Dockerfile"

[env]
  PORT = "8080"
  # No OTLP endpoint configured: OTel falls back to stdout exporters, which
  # land in `fly logs`. Point this at a collector when one exists.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
