# fly.toml app configuration file generated for uk-energy-backtest on 2026-06-10T19:12:01Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'uk-energy-backtest'
primary_region = 'lhr'

[build]
  dockerfile = 'build/Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
