name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC — catch newly disclosed CVEs

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy — vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          # Report all severities to code scanning; adjust branch-protection
          # rules in GitHub settings to decide which severities block merges.
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  govulncheck:
    name: govulncheck — reachable Go CVEs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  zizmor:
    name: Zizmor — workflow security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # lets zizmor resolve action metadata for richer analysis
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
