openapi: 3.1.0
info:
  title: uk-energy-backtest API
  version: 0.1.0

servers:
  - url: /api/v1
    description: Local (Vite proxy or embedded mode)

paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness check
      responses:
        '200':
          description: Service is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /status:
    get:
      operationId: getStatus
      summary: Build and runtime status
      responses:
        '200':
          description: Compile-time metadata injected at build
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /cost:
    post:
      operationId: postCost
      summary: Cost a load profile against one or more tariffs
      description: >
        Fully stateless: the pre-aggregated 48-bucket load profile and the
        tariff definitions go in, a costed result per tariff comes out, and
        nothing is retained. Raw half-hourly readings never cross this
        endpoint — clients must aggregate locally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [profile, tariffs]
              properties:
                profile:
                  $ref: '#/components/schemas/Profile'
                tariffs:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/Tariff'
      responses:
        '200':
          description: One costed result per tariff, same order as the request
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CostResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /octopus/cost:
    post:
      operationId: postOctopusCost
      summary: Fetch usage from Octopus Energy, aggregate, and cost tariffs
      description: >
        Proxies the Octopus Energy API (the browser cannot call it directly —
        no CORS). The API key arrives in the X-Octopus-Key header, is used
        once for upstream Basic auth, and is never stored or logged. Raw
        half-hourly data is aggregated to the load profile and discarded
        before responding. Responses carry Cache-Control no-store.
      parameters:
        - name: X-Octopus-Key
          in: header
          required: false
          description: >
            Octopus API key, used per-request and discarded. Either this or
            X-Octopus-Token must be present.
          schema:
            type: string
        - name: X-Octopus-Token
          in: header
          required: false
          description: >
            OAuth access token (alternative to the API key); forwarded as a
            Bearer credential and discarded.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account, period_from, period_to, tariffs]
              properties:
                account:
                  type: string
                  description: Octopus account number
                  example: A-1234ABCD
                period_from:
                  type: string
                  format: date
                  description: Inclusive start date
                period_to:
                  type: string
                  format: date
                  description: Exclusive end date; at most 732 days after period_from
                gas_unit:
                  type: string
                  enum: [kwh, m3]
                  default: kwh
                  description: >
                    How gas consumption values are interpreted. SMETS1 meters
                    report kWh; SMETS2 report m³ (converted via calorific value).
                calorific_value:
                  type: number
                  description: Calorific value in MJ/m³ for m³ conversion
                  default: 39.5
                tariffs:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    $ref: '#/components/schemas/Tariff'
      responses:
        '200':
          description: The aggregated profile plus one costed result per tariff
          content:
            application/json:
              schema:
                type: object
                required: [profile, results]
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CostResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing X-Octopus-Key header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream Octopus API call failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /octopus/tariff:
    post:
      operationId: postOctopusTariff
      summary: Prefill a tariff from the account's current Octopus agreements
      description: >
        Looks up the account's live import/export/gas tariff agreements,
        pulls the published rates for each (standing charges and unit rates),
        and returns a prefilled Tariff in this app's model. Time-of-use
        tariffs are reconstructed as bands from the last 24h of published
        rates; dynamic tariffs (Agile) collapse to a flat 24h average with a
        warning. Stateless; the key is discarded with the request.
      parameters:
        - name: X-Octopus-Key
          in: header
          required: false
          description: >
            Octopus API key, used per-request and discarded. Either this or
            X-Octopus-Token must be present.
          schema:
            type: string
        - name: X-Octopus-Token
          in: header
          required: false
          description: >
            OAuth access token (alternative to the API key); forwarded as a
            Bearer credential and discarded.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account]
              properties:
                account:
                  type: string
                  example: A-1234ABCD
      responses:
        '200':
          description: The prefilled tariff, its source tariff codes, and warnings
          content:
            application/json:
              schema:
                type: object
                required: [tariff, codes, warnings]
                properties:
                  tariff:
                    $ref: '#/components/schemas/Tariff'
                  codes:
                    type: object
                    required: [import]
                    properties:
                      import:
                        type: string
                        example: E-1R-FLUX-IMPORT-23-02-14-C
                      export:
                        type: string
                      gas:
                        type: string
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing X-Octopus-Key header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream Octopus API call failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /oauth/config:
    get:
      operationId: getOAuthConfig
      summary: Octopus OAuth availability and client parameters
      description: >
        Reports whether the OAuth connect flow is configured
        (OCTOPUS_OAUTH_CLIENT_ID set server-side) and, if so, the public
        client id, authorize URL, and scopes the SPA should request.
      responses:
        '200':
          description: OAuth configuration
          content:
            application/json:
              schema:
                type: object
                required: [enabled]
                properties:
                  enabled:
                    type: boolean
                  client_id:
                    type: string
                  authorize_url:
                    type: string
                    example: https://auth.octopus.energy/authorize/
                  scopes:
                    type: array
                    items:
                      type: string

  /oauth/token:
    post:
      operationId: postOAuthToken
      summary: Relay a PKCE token exchange to auth.octopus.energy
      description: >
        Forwards an authorization_code (PKCE) or refresh_token grant to the
        Octopus auth server with the configured public client id, and relays
        the auth server's JSON response and status verbatim. Nothing is
        stored server-side. This route exists only when
        OCTOPUS_OAUTH_CLIENT_ID is configured; otherwise it is 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                code_verifier:
                  type: string
                redirect_uri:
                  type: string
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token response from the auth server, relayed verbatim
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  refresh_token:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          description: Auth server unreachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  responses:
    BadRequest:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: not_found
            message:
              type: string
              example: resource not found

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    Profile:
      type: object
      description: >
        Compact, date-stripped load profile. Buckets are local
        (Europe/London) half-hours of day; bucket i covers local minute i*30.
        Values are kWh, each source half-hour rounded to 0.01 kWh
        (round-half-to-even) before summing into its bucket.
      required: [supplied_days, import_hh]
      properties:
        supplied_days:
          type: integer
          minimum: 0
          description: Count of distinct local calendar dates with import readings
        import_hh:
          type: array
          minItems: 48
          maxItems: 48
          items:
            type: number
            minimum: 0
        export_hh:
          type: array
          minItems: 48
          maxItems: 48
          items:
            type: number
            minimum: 0
          description: Omitted when the dataset has no export meter
        gas_kwh:
          type: number
          minimum: 0
          description: Total gas in kWh (already converted from m³ if applicable)

    Band:
      type: object
      description: >
        Time-of-use rate window in local clock time. First matching band
        wins; from > to wraps past midnight. Boundaries must fall on :00 or
        :30.
      required: [from, to, rate]
      properties:
        from:
          type: string
          pattern: '^([01][0-9]|2[0-3]):(00|30)$'
          example: "02:00"
        to:
          type: string
          pattern: '^([01][0-9]|2[0-3]):(00|30)$'
          example: "05:00"
        rate:
          type: number
          description: VAT-inclusive pence per kWh

    Tariff:
      type: object
      description: All rates are VAT-inclusive pence, as shown on a consumer quote.
      required: [name, electricity]
      properties:
        name:
          type: string
          example: Octopus Flux (current)
        electricity:
          type: object
          required: [standing_charge, import_default]
          properties:
            standing_charge:
              type: number
              description: Pence per day
            import_default:
              type: number
              description: Fallback pence/kWh for half-hours outside all bands
            import_bands:
              type: array
              items:
                $ref: '#/components/schemas/Band'
            export_default:
              type: number
              description: Fallback export pence/kWh
            export_bands:
              type: array
              items:
                $ref: '#/components/schemas/Band'
        gas:
          type: object
          description: Optional; omit for electricity-only tariffs
          required: [standing_charge, rate]
          properties:
            standing_charge:
              type: number
              description: Pence per day
            rate:
              type: number
              description: Flat pence per kWh

    CostResult:
      type: object
      description: Costed outcome for one tariff. All money values are pence.
      required: [name, import_p, export_credit_p, gas_p, standing_p, net_p, import_rates, export_rates]
      properties:
        name:
          type: string
        import_p:
          type: number
        export_credit_p:
          type: number
          description: Positive credit, already subtracted in net_p
        gas_p:
          type: number
        standing_p:
          type: number
        net_p:
          type: number
          description: import_p + gas_p + standing_p − export_credit_p
        import_rates:
          type: array
          minItems: 48
          maxItems: 48
          items:
            type: number
          description: Resolved pence/kWh per bucket, for chart overlays
        export_rates:
          type: array
          minItems: 48
          maxItems: 48
          items:
            type: number

    StatusResponse:
      type: object
      required: [status, git_sha, build_time]
      properties:
        status:
          type: string
          example: ok
        git_sha:
          type: string
          description: Git commit SHA injected at build time
          example: a1b2c3d4e5f6
        build_time:
          type: string
          format: date-time
          description: RFC 3339 timestamp of when the binary was compiled
          example: "2026-04-25T12:00:00Z"
